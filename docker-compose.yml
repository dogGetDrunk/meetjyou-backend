services:
  spring_boot:
    container_name: spring_boot
    restart: always
    image: ssove/meetjyou:${IMAGE_TAG:-latest}
    mem_limit: 700m
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=db,secrets,release
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/firebase-adminsdk.json
      - OCI_CONFIG_FILE_PATH=/run/secrets/oci/config
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./data/spring_boot/firebase-adminsdk.json:/run/secrets/firebase-adminsdk.json:ro
      - ./data/spring_boot/oci:/run/secrets/oci:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - my_network

  nginx:
    image: nginx:1.26.3
    container_name: nginx
    volumes:
      - ./data/nginx:/etc/nginx/conf.d
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "80:80"
      - "443:443"
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    depends_on:
      - spring_boot
    networks:
      my_network:
        ipv4_address: 172.28.0.10

  certbot:
    container_name: certbot
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - my_network

networks:
  my_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
