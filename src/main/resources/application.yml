spring:
  application:
    name: meetjyou
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      keepalive-time: 240000      # 4분마다 idle connection ping
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 5        # 프리티어 환경에 맞게 축소 (30으로 늘리면 풀 고갈 해소 확인됨 - OCI 실제 max_connections 확인 후 재검토)
      minimum-idle: 2
      connection-timeout: 5000    # 풀 고갈 시 30초 대기 대신 5초 내 빠른 실패
      connection-test-query: SELECT 1
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME}
      password: ${SPRING_SECURITY_USER_PASSWORD}

springdoc:
  swagger-ui:
    path: /api-doc  # swagger-ui 접근 경로에 대한 별칭, 해당 주소로 접속해도 http://localhost:8080/swagger-ui/index.html로 리다이렉션 됨.
    groups-order: DESC # path, query, body, response 순으로 출력
    tags-sorter: alpha # 태그를 알파벳 순으로 정렬
  #    operations-sorter: method  # delete - get - patch - post - put 순으로 정렬, alpha를 사용하면 알파벳 순으로 정렬 가능
  paths-to-match:
    - /api/** # swagger-ui에 표시할 api의 엔드포인트 패턴
  pre-loading-enabled: true # 앱 기동 시 API 스펙 미리 생성 (첫 방문 시 지연 제거)

logging:
  level:
    root: INFO

server:
  forward-headers-strategy: native

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: never
    metrics:
      enabled: true
  metrics:
    tags:
      application: meetjyou
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

dns:
  url: ${DNS_URL}

oracle:
  oci:
    bucket-name: ${OCI_BUCKET_NAME}
    namespace: ${OCI_NAMESPACE}
    par-expiration-minutes: ${OCI_PAR_EXPIRATION_MINUTES}
    region: ${OCI_REGION}
    auth:
      mode: ${OCI_AUTH_MODE:FILE} # FILE or INSTANCE
      config-file-path: ${OCI_CONFIG_FILE_PATH:/run/secrets/oci/config} # in docker container
      profile: ${OCI_PROFILE:DEFAULT}

jwt:
  issuer: ${JWT_ISSUER}
  access-expiration: ${JWT_AT_EXP} # 30분
  refresh-expiration: ${JWT_RT_EXP} # 30일
  secret-key: ${JWT_SECRET_KEY} # 256 bits for HS256

auth:
  kakao:
    issuer: ${KAKAO_ISSUER}
    jwks-uri: ${KAKAO_JWKS_URI}
    access-token-info-uri: ${KAKAO_ACCESS_TOKEN_INFO_URI}
    user-info-uri: ${KAKAO_USER_INFO_URI}
    client-id: ${KAKAO_CLIENT_ID}
    app-id: ${KAKAO_APP_ID}
    clock-skew-seconds: ${KAKAO_CLOCK_SKEW_SECONDS}
    jwk-cache-ttl-minutes: ${KAKAO_JWK_CACHE_TTL_MINUTES}
  google:
    issuer: ${GOOGLE_ISSUER}
    clients:
      android: ${GOOGLE_CLIENT_ID_ANDROID}
      web: ${GOOGLE_CLIENT_ID_WEB}
      ios: ${GOOGLE_CLIENT_ID_IOS}
    # jwks-uri: ${GOOGLE_JWKS_URI}
    # clock-skew-seconds: ${GOOGLE_CLOCK_SKEW_SECONDS}
    # jwk-cache-ttl-minutes: ${GOOGLE_JWK_CACHE_TTL_MINUTES}
  apple:
    issuer: ${APPLE_ISSUER}
    jwks-uri: ${APPLE_JWKS_URI}
    client-id: ${APPLE_CLIENT_ID}
    clock-skew-seconds: ${APPLE_CLOCK_SKEW_SECONDS}
    jwk-cache-ttl-minutes: ${APPLE_JWK_CACHE_TTL_MINUTES}

dev:
  bypass:
    enabled: false

admin:
  claim-passphrase: ${ADMIN_CLAIM_PASSPHRASE}

load-test-token:
  enabled: ${LOAD_TEST_TOKEN_ENABLED:false}
  secret: ${LOAD_TEST_TOKEN_SECRET:}
  ttl-millis: ${LOAD_TEST_TOKEN_TTL_MILLIS:300000}

app:
  websocket:
    allowed-origin-patterns:
      - ${WEBSOCKET_ALLOWED_ORIGIN_PATTERN}
      - "*"

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}
